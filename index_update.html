<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BusTalk TMSA 3.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- MANIFEST PWA -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQnVzVGFsayBNZW5vcmNhIiwic2hvcnRfbmFtZSI6IkJ1c1RhbGsiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzFhMWExYSIsInRoZW1lX2NvbG9yIjoiIzFhMWExYSIsImljb25zIjpbeyJzcmMiOiJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8zNzYwLzM3NjAxMzcucG5nIiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyIsInB1cnBvc2UiOiJhbnkifV19">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3760/3760137.png">

    <style>
        [x-cloak] { display: none !important; }
        
        body { 
            background-color: #1a1a1a; 
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            padding-top: env(safe-area-inset-top);
        }

        .bg-gray-custom { background-color: #262626; }
        
        /* Efectos Botón Radio */
        .ptt-active { background-color: #ef4444 !important; transform: scale(0.95); box-shadow: 0 0 40px rgba(239, 68, 68, 0.9); }
        .ptt-receiving { background-color: #10b981 !important; box-shadow: 0 0 40px rgba(16, 185, 129, 0.9); animation: pulse-green 1s infinite; }
        @keyframes pulse-green { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Luces y Alertas */
        .luz-parada { box-shadow: 0 0 15px #10b981, inset 0 0 10px #10b981; background-color: #10b981; color: black; }
        .alerta-lleno { background-color: #ea580c; animation: pulse-alert 2s infinite; border-color: #c2410c; }
        .alerta-retraso { background-color: #ca8a04; animation: pulse-alert 2s infinite; border-color: #a16207; }
        .alerta-averia { background-color: #dc2626; animation: pulse-alert 1s infinite; border-color: #991b1b; }
        @keyframes pulse-alert { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="busTalkApp()" x-init="init()" class="text-white font-sans h-screen flex flex-col overflow-hidden">

    <!-- MOTOR PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('install', e => e.waitUntil(self.skipWaiting())); self.addEventListener('activate', e => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', e => {});`;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
            });
        }
    </script>

    <!-- ALERTA VISUAL RECIBIENDO AUDIO -->
    <div x-show="estadoRadio === 'recibiendo'" x-transition.opacity class="fixed inset-0 bg-green-500/20 z-[60] pointer-events-none animate-pulse"></div>

    <!-- ========================================== -->
    <!-- SCREEN 0: LOGIN MULTISESIÓN                -->
    <!-- ========================================== -->
    <div x-show="screen === 0" x-transition.opacity x-cloak class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-gray-900 p-8 rounded-[2rem] w-full max-w-sm text-center shadow-2xl border border-gray-800">
            <div class="text-yellow-500 text-6xl mb-4"><i class="fas fa-bus"></i></div>
            <h2 class="text-2xl font-black mb-1 text-white uppercase tracking-wider">BusTalk TMSA</h2>
            <p class="text-gray-400 mb-6 text-xs tracking-widest uppercase">Identificación de Personal</p>
            
            <button @click="loginGoogle()" class="w-full bg-white hover:bg-gray-200 text-black font-black text-sm py-4 rounded-xl transition-transform active:scale-95 shadow-md flex items-center justify-center gap-3 mb-4">
                <i class="fab fa-google text-red-500 text-lg"></i> Entrar con Google
            </button>

            <div class="relative flex py-2 items-center mb-4">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 text-[10px] font-bold tracking-widest uppercase">O con correo</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <input type="email" x-model="authEmail" placeholder="Correo electrónico" 
                   class="w-full p-4 mb-3 rounded-xl bg-gray-800 text-white text-sm font-bold border border-gray-700 focus:border-yellow-500 outline-none transition-colors">
            
            <input type="password" x-model="authPass" placeholder="Contraseña" 
                   class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white text-sm font-bold border border-gray-700 focus:border-yellow-500 outline-none transition-colors">
            
            <div class="flex gap-2 mb-6">
                <button @click="loginEmail()" class="w-1/2 bg-blue-600 active:bg-blue-700 text-white font-black text-sm py-4 rounded-xl transition-transform active:scale-95">Entrar</button>
                <button @click="registrarEmail()" class="w-1/2 bg-gray-700 active:bg-gray-600 text-white font-black text-sm py-4 rounded-xl transition-transform active:scale-95">Registrar</button>
            </div>

            <button @click="loginAnon()" class="w-full bg-transparent border border-gray-600 text-gray-400 hover:text-white font-bold text-xs py-3 rounded-xl transition-colors active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-user-secret"></i> Entrar sin cuenta
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCREEN 1: SELECCIÓN DE BUS Y LÍNEA         -->
    <!-- ========================================== -->
    <div x-show="screen === 1" x-transition.opacity x-cloak class="fixed inset-0 bg-black z-[90] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-gray-900 p-8 rounded-[2rem] w-full max-w-sm text-center shadow-2xl border border-gray-800 relative">
            
            <button @click="cerrarSesionTotal()" class="absolute top-4 right-4 text-gray-500 hover:text-red-500"><i class="fas fa-sign-out-alt text-xl"></i></button>

            <div class="text-yellow-500 text-5xl mb-6"><i class="fas fa-route"></i></div>
            <h2 class="text-xl font-black mb-2 text-white uppercase tracking-wider">Tu Ruta de Hoy</h2>
            <p class="text-gray-400 mb-6 text-sm">Selecciona tu autobús y tu Zona.</p>
            
            <input type="number" x-model="miBusInput" placeholder="Nº de Bus (Ej: 56)" 
                   class="w-full p-5 mb-4 rounded-2xl bg-gray-800 text-white text-center text-2xl font-black border-2 border-gray-700 focus:border-yellow-500 outline-none transition-colors">
            
            <select x-model="miLineaInput" class="w-full p-4 mb-6 rounded-2xl bg-gray-800 text-white text-center text-sm font-bold border-2 border-gray-700 focus:border-yellow-500 outline-none appearance-none">
                <option value="L01 (Maó-Ciu)">L01 (Maó - Ciutadella)</option>
                <option value="L14 (Exprés)">L14 (Exprés Maó-Ciu)</option>
                <option value="Zona Maó y Levante">🔵 ZONA MAÓ Y LEVANTE</option>
                <option value="Zona Centro y Poniente">🟠 ZONA CENTRO/PONIENTE</option>
                <option value="Escolar">Rutas Escolares</option>
                <option value="Discrecional">Discrecional / Otros</option>
                <option value="General">🌍 CANAL GENERAL</option>
            </select>

            <button @click="iniciarTurno()" class="w-full bg-yellow-500 active:bg-yellow-600 text-black font-black text-lg py-5 rounded-2xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(234,179,8,0.3)]">
                CONECTAR RADIO
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCREEN 2: APP PRINCIPAL (RADAR Y RADIO)    -->
    <!-- ========================================== -->
    <template x-if="screen === 2">
        <div class="flex flex-col h-full w-full">
            
            <!-- CABECERA -->
            <header class="p-4 bg-black flex justify-between items-center border-b border-gray-800 z-10 flex-shrink-0">
                <div class="flex flex-col">
                    <div class="flex items-center space-x-2">
                        <span class="bg-yellow-500 text-black font-black px-2 py-1 rounded-md text-sm" x-text="'BUS ' + miBus"></span>
                        <h1 class="text-lg font-black tracking-tighter italic text-gray-300">Bus<span class="text-yellow-500">Talk</span></h1>
                    </div>
                    <div class="mt-1 flex items-center gap-1 overflow-hidden">
                        <span class="text-[10px] font-bold text-sky-400 uppercase tracking-widest flex-shrink-0">Canal:</span>
                        <span class="text-[11px] font-black text-white truncate px-2 py-0.5 bg-gray-800 rounded-md border border-gray-700" x-text="miLinea"></span>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <span class="text-[8px] font-mono text-gray-500 border border-gray-700 px-1.5 py-0.5 rounded tracking-[0.2em] opacity-60">medbasha</span>
                    <div class="flex items-center gap-1.5 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800">
                        <span class="w-2 h-2 rounded-full" :class="conectado ? 'bg-green-500 animate-pulse' : 'bg-red-500'"></span>
                    </div>
                    <button @click="cerrarTurno()" class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center text-gray-400 active:text-red-500 transition-colors shadow-md">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </header>

            <!-- RADAR -->
            <main class="flex-1 overflow-y-auto p-3 space-y-3 bg-[#121212] hide-scrollbar pb-6">
                <div class="flex justify-between items-end mb-2 px-2 mt-2">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Radar de Zona</p>
                    <p class="text-[10px] text-gray-600 font-bold" x-text="compañeros.length + ' activos'"></p>
                </div>
                
                <template x-if="compañeros.length === 0">
                    <div class="text-center py-10 opacity-30">
                        <i class="fas fa-satellite-dish text-6xl mb-4"></i>
                        <p class="font-bold text-sm uppercase tracking-widest">Canal despejado</p>
                    </div>
                </template>

                <template x-for="comp in compañeros" :key="comp.id">
                    <div class="p-4 rounded-2xl border-l-4 flex justify-between items-center shadow-lg transition-colors"
                         :class="[
                            comp.alerta === 'AVERÍA' ? 'alerta-averia' : 
                            comp.alerta === 'LLENO' ? 'alerta-lleno' : 
                            comp.alerta === 'RETRASO' ? 'alerta-retraso' : 
                            (comp.id === elQueHabla ? 'border-green-500 bg-green-900/40' : (comp.enParada ? 'border-green-500 bg-gray-800' : 'border-blue-500 bg-gray-800'))
                         ]">
                        
                        <div class="flex-1 overflow-hidden">
                            <div class="flex items-center gap-2 mb-1">
                                <p class="font-black text-2xl text-white" x-text="'Bus ' + comp.id"></p>
                                <i x-show="comp.id === elQueHabla" class="fas fa-volume-up text-green-400 animate-pulse text-xl ml-2"></i>
                                <span x-show="comp.alerta" class="px-2 py-0.5 bg-black/50 text-white rounded text-[11px] font-black uppercase tracking-widest border border-white/20 shadow-md">
                                    <i class="fas fa-exclamation-triangle text-yellow-400 mr-1"></i> <span x-text="comp.alerta"></span>
                                </span>
                            </div>

                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-sm font-black uppercase tracking-wider px-2 py-0.5 rounded-md flex items-center gap-1 whitespace-nowrap truncate"
                                      :class="comp.enParada ? 'luz-parada' : 'bg-blue-500/20 text-blue-100'">
                                    <i class="fas" :class="comp.enParada ? 'fa-parking' : 'fa-route'"></i>
                                    <span x-text="comp.ubicacion"></span>
                                </span>
                                <span x-show="!comp.enParada && comp.eta" class="text-sm text-white opacity-90 font-bold whitespace-nowrap">
                                    <i class="fas fa-clock mr-1"></i> <span x-text="calcularMinutos(comp.eta)"></span>m
                                </span>
                            </div>
                        </div>
                        
                        <div class="text-right bg-black/40 px-5 py-2 rounded-xl border border-white/10 ml-2 flex-shrink-0">
                            <p class="text-[9px] uppercase tracking-widest text-gray-300 font-bold mb-0.5">Pax</p>
                            <span class="text-3xl font-black" :class="comp.pax > 40 ? 'text-red-400' : 'text-yellow-400'" x-text="comp.pax"></span>
                        </div>
                    </div>
                </template>
            </main>

            <!-- PANEL DE CONTROL DEL CONDUCTOR -->
            <footer class="p-4 bg-black rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-gray-800 flex-shrink-0 relative z-20">
                <div class="flex flex-col items-center max-w-md mx-auto">
                    
                    <!-- ALERTAS -->
                    <div class="w-full flex gap-2 mb-4 bg-gray-900 p-2 rounded-xl border border-gray-800">
                        <button @click="toggleAlerta('LLENO')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase border active:scale-95 transition-transform shadow-md" :class="miAlerta === 'LLENO' ? 'bg-orange-600 border-orange-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400'">🔴 Lleno</button>
                        <button @click="toggleAlerta('RETRASO')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase border active:scale-95 transition-transform shadow-md" :class="miAlerta === 'RETRASO' ? 'bg-yellow-600 border-yellow-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400'">🟡 Retraso</button>
                        <button @click="toggleAlerta('AVERÍA')" class="flex-1 py-2.5 rounded-lg text-[10px] font-black uppercase border active:scale-95 transition-transform shadow-md" :class="miAlerta === 'AVERÍA' ? 'bg-red-600 border-red-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400'">🆘 Avería</button>
                    </div>

                    <!-- CARRUSEL Y BOTÓN INVERSOR (🔃) -->
                    <div class="w-full mb-4 flex items-center gap-2">
                        <button @click="invertirRuta()" class="w-12 h-12 flex-shrink-0 bg-blue-600 text-white rounded-xl shadow-lg font-black text-xl active:bg-blue-700 transition-transform active:scale-90">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <div class="flex overflow-x-auto hide-scrollbar gap-2 pb-1 flex-1">
                            <template x-for="lugar in misParadasArray" :key="lugar">
                                <button @click="actualizarUbicacion(lugar)" 
                                        class="flex-shrink-0 px-5 py-3 rounded-xl text-xs font-black uppercase tracking-wider border transition-colors" 
                                        :class="miUbicacion === lugar ? 'bg-yellow-500 border-yellow-400 text-black shadow-[0_0_10px_rgba(234,179,8,0.3)]' : 'bg-gray-800 border-gray-700 text-gray-400 active:bg-gray-700'" 
                                        x-text="lugar"></button>
                            </template>
                        </div>
                    </div>

                    <!-- PARADA/RUTA Y PASAJEROS -->
                    <div class="w-full flex gap-3 mb-6">
                        <div class="flex-1 bg-gray-900 rounded-2xl border border-gray-800 p-2 flex flex-col justify-center">
                            <button @click="toggleParada()" class="w-full py-3 rounded-xl text-sm font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2"
                                    :class="enParada ? 'luz-parada' : 'bg-gray-800 text-gray-400 shadow-inner'">
                                <i class="fas" :class="enParada ? 'fa-parking' : 'fa-play'"></i>
                                <span x-text="enParada ? 'EN PARADA' : 'SALIR / RUTA'"></span>
                            </button>
                            <div x-show="!enParada" class="flex justify-between items-center mt-2 px-1">
                                <button @click="ajustarMinutos(-1)" class="w-10 h-10 bg-gray-800 rounded-lg text-white font-bold text-xl active:bg-gray-700">-</button>
                                <div class="text-center">
                                    <span class="text-lg font-black text-blue-400" x-text="minutosRuta"></span><span class="text-xs text-blue-400 ml-1">min</span>
                                </div>
                                <button @click="ajustarMinutos(1)" class="w-10 h-10 bg-gray-800 rounded-lg text-white font-bold text-xl active:bg-gray-700">+</button>
                            </div>
                        </div>

                        <!-- Botones PAX Continuos -->
                        <div class="flex-1 bg-gray-900 p-2 rounded-2xl border border-gray-800 flex items-center justify-between">
                            <button @touchstart.prevent="iniciarPax(-1, $event)" @touchend.prevent="pararPax($event)" @mousedown="iniciarPax(-1, $event)" @mouseup="pararPax($event)" @mouseleave="pararPax($event)" 
                                    class="w-14 h-14 rounded-xl bg-gray-800 text-3xl flex items-center justify-center active:bg-red-500 transition-colors text-white shadow-md select-none">-</button>
                            <div class="text-center flex-1">
                                <p class="text-[9px] uppercase text-gray-500 font-black tracking-widest">PAX</p>
                                <p class="text-4xl font-black text-yellow-500 leading-none" x-text="miPax"></p>
                            </div>
                            <button @touchstart.prevent="iniciarPax(1, $event)" @touchend.prevent="pararPax($event)" @mousedown="iniciarPax(1, $event)" @mouseup="pararPax($event)" @mouseleave="pararPax($event)" 
                                    class="w-14 h-14 rounded-xl bg-gray-800 text-3xl flex items-center justify-center active:bg-green-500 transition-colors text-white shadow-md select-none">+</button>
                        </div>
                    </div>

                    <!-- BOTONES DE RADIO -->
                    <div class="relative flex items-center justify-between w-full pb-2 px-1">
                        
                        <div class="flex flex-col gap-2">
                            <!-- Botón CANAL GLOBAL -->
                            <button @click="modoGlobal = !modoGlobal" class="w-12 h-12 rounded-full border-2 flex flex-col items-center justify-center transition-all shadow-md"
                                    :class="modoGlobal ? 'bg-red-600 border-red-400 text-white shadow-[0_0_15px_rgba(220,38,38,0.6)]' : 'bg-gray-900 border-gray-700 text-gray-500'">
                                <i class="fas fa-globe-europe text-lg mb-0.5"></i>
                                <span class="text-[5px] font-black uppercase tracking-widest" x-text="modoGlobal ? 'EMERGENCIA' : 'GLOBAL'"></span>
                            </button>
                            
                            <!-- Botón CANAL RÁPIDO -->
                            <button @click="cambiarCanalRapido()" class="w-12 h-12 rounded-full border-2 flex flex-col items-center justify-center transition-all shadow-md bg-gray-800 border-blue-500 text-blue-400 active:bg-blue-600 active:text-white">
                                <i class="fas fa-exchange-alt text-lg mb-0.5"></i>
                                <span class="text-[5px] font-black uppercase tracking-widest">CANAL</span>
                            </button>
                        </div>
                        
                        <!-- BOTÓN PTT INTELIGENTE (1 TOQUE PARA HABLAR) -->
                        <button id="btn-ptt"
                            @click="toggleRadio()"
                            class="w-32 h-32 rounded-full flex flex-col items-center justify-center shadow-[0_0_30px_rgba(234,179,8,0.2)] transition-all duration-150 relative z-10"
                            :class="[
                                estadoRadio === 'grabando' ? 'ptt-active' : (estadoRadio === 'recibiendo' ? 'ptt-receiving' : 'bg-yellow-500'),
                                modoGlobal && estadoRadio !== 'recibiendo' ? 'border-4 border-red-500' : ''
                            ]">
                            <i class="fas text-4xl mb-1 text-black" :class="estadoRadio === 'recibiendo' ? 'fa-volume-up' : 'fa-microphone'"></i>
                            <template x-if="estadoRadio === 'reposo'"><span class="text-black font-black text-[10px] tracking-widest" x-text="modoGlobal ? 'AVISO A TODOS' : 'TOCA Y HABLA'"></span></template>
                            <template x-if="estadoRadio === 'grabando'">
                                <div class="flex flex-col items-center">
                                    <span class="text-white font-black text-[11px] tracking-widest animate-pulse">GRABANDO</span>
                                    <span class="text-white/80 font-bold text-[8px] mt-1">TOCA PARA ENVIAR</span>
                                </div>
                            </template>
                            <template x-if="estadoRadio === 'recibiendo'">
                                <div class="flex flex-col items-center leading-none">
                                    <span class="text-black font-black text-xs tracking-widest" x-text="'BUS ' + elQueHabla"></span>
                                    <span class="text-black/70 font-bold text-[8px] mt-1 truncate max-w-[90px]" x-text="lineaQueHabla"></span>
                                </div>
                            </template>
                        </button>

                        <!-- Botón REPETIR -->
                        <div class="flex flex-col gap-2">
                            <button @click="repetirUltimoAudio()" class="w-14 h-14 rounded-full border-2 flex flex-col items-center justify-center transition-colors shadow-md"
                                    :class="ultimoAudio ? 'bg-gray-800 border-gray-600 text-gray-300 active:bg-green-600 active:text-white' : 'bg-gray-900 border-gray-800 text-gray-700 opacity-50 cursor-not-allowed'">
                                <i class="fas fa-redo text-lg mb-0.5"></i>
                                <span class="text-[6px] font-black tracking-widest">REPETIR</span>
                            </button>
                            <div class="w-14 h-14 opacity-0"></div> <!-- Espaciador -->
                        </div>
                    </div>
                    
                </div>
            </footer>
        </div>
    </template>

    <script>
        // --- TUS CLAVES DE BUSTALKTMSA ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7b6_T0ze2HgXiYHfvUeL12JSXE7ZKogc",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            databaseURL: "https://misturnos-fe3ea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:fd03fb429263be52392476",
            measurementId: "G-2SY1ENPWCJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function busTalkApp() {
            return {
                screen: 0, 
                authEmail: '', authPass: '', user: null,
                
                sesionIniciada: false, conectado: false, wakeLockStatus: null,
                miBusInput: '', miLineaInput: 'L01 (Maó-Ciu)', 
                miBus: '', miLinea: '', miPax: 0, miUbicacion: '',
                enParada: true, minutosRuta: 15, etaFinal: null, miAlerta: null,
                compañeros:[], misParadasArray:[],
                
                estadoRadio: 'reposo', elQueHabla: null, lineaQueHabla: '',
                mediaRecorder: null, chunks:[], streamingMsgId: null, ultimoAudio: null,
                relojUI: null, modoGlobal: false, intervaloPax: null, timerAutoStopPax: null, watchdogRadio: null, timerAutoStop: null,
                isInitialLoad: true,
                
                listaLineasComunes: ['L01 (Maó-Ciu)', 'Zona Centro y Poniente', 'Zona Maó y Levante'],

                init() {
                    auth.onAuthStateChanged((user) => {
                        if (user) {
                            this.user = user;
                            this.screen = 1; 
                            
                            const busGuardado = localStorage.getItem('bustalk_bus');
                            const lineaGuardada = localStorage.getItem('bustalk_linea');
                            if (busGuardado && lineaGuardada) {
                                this.miBusInput = busGuardado;
                                this.miLineaInput = lineaGuardada;
                                this.iniciarTurno(); 
                            }
                        } else {
                            this.user = null;
                            this.screen = 0; 
                        }
                    });

                    this.relojUI = setInterval(() => { 
                        if(this.screen === 2) this.compañeros = [...this.compañeros]; 
                    }, 10000);
                },

                // AUTENTICACIÓN
                loginGoogle() {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    auth.signInWithPopup(provider).catch(err => alert("Error Google: " + err.message));
                },
                loginEmail() {
                    if(!this.authEmail || !this.authPass) return alert("Rellena correo y contraseña.");
                    auth.signInWithEmailAndPassword(this.authEmail, this.authPass).catch(err => alert("Error: " + err.message));
                },
                registrarEmail() {
                    if(!this.authEmail || !this.authPass) return alert("Rellena correo y contraseña.");
                    auth.createUserWithEmailAndPassword(this.authEmail, this.authPass)
                        .then(() => alert("Cuenta creada."))
                        .catch(err => alert("Error: " + err.message));
                },
                loginAnon() {
                    auth.signInAnonymously().catch(err => alert("Error: " + err.message));
                },
                cerrarSesionTotal() {
                    if(confirm("¿Cerrar sesión completamente?")) {
                        auth.signOut().then(() => {
                            localStorage.removeItem('bustalk_bus');
                            localStorage.removeItem('bustalk_linea');
                            this.screen = 0;
                            location.reload();
                        });
                    }
                },

                // DICCIONARIO
                cargarParadas() {
                    const diccionario = {
                        "L01 (Maó-Ciu)": ["Ciu", "Ferr", "Mer", "Alaior", "Argen", "Maó"], // <- AQUÍ ESTÁN "Mer" y "Argen"
                        "L14 (Exprés)": ["Ciu", "Maó"],
                        "Zona Maó y Levante": ["Maó", "Castell", "S.Lluís", "P.Prima", "S'Algar", "Canutells", "Mesquida", "C.Porter", "Binisafúller", "Binibèquer", "Alcaufar", "Trebalúger", "Bintaufa", "S.Climent"],
                        "Zona Centro y Poniente": ["Ciu", "Ferr", "Mer", "Alaior", "Migjorn", "S.Tomàs", "Son Bou", "Galdana"]
                    };
                    let paradas = diccionario[this.miLinea] || ['Ciu', 'Ferr', 'Mer', 'Alaior', 'Maó', 'Castell', 'S.Lluís', 'C.Porter', 'S.Bou', 'Galdana', 'S.Tomàs', 'Migjorn', 'P.Prima', 'Fornells', 'Arenal'];
                    this.misParadasArray = paradas;
                    this.miUbicacion = paradas[0]; 
                },

                invertirRuta() {
                    this.playAudioAviso('ui-tap');
                    this.misParadasArray = this.misParadasArray.slice().reverse();
                },

                cambiarCanalRapido() {
                    let idx = this.listaLineasComunes.indexOf(this.miLinea);
                    idx = (idx + 1) % this.listaLineasComunes.length;
                    this.miLinea = this.listaLineasComunes[idx];
                    
                    localStorage.setItem('bustalk_linea', this.miLinea);
                    this.cargarParadas();
                    this.actualizarMiEstadoBD();
                    this.playAudioAviso('ui-tap');
                },

                async mantenerPantallaDespierta() {
                    if ('wakeLock' in navigator) { try { this.wakeLockStatus = await navigator.wakeLock.request('screen'); } catch (err) {} }
                },

                iniciarTurno() {
                    if (!this.miBusInput || this.miBusInput <= 0) { alert("Pon tu número de bus."); return; }

                    this.miBus = this.miBusInput.toString();
                    this.miLinea = this.miLineaInput;
                    
                    this.cargarParadas();

                    localStorage.setItem('bustalk_bus', this.miBus);
                    localStorage.setItem('bustalk_linea', this.miLinea);
                    
                    this.screen = 2; 
                    this.sesionIniciada = true;
                    this.conectado = true;

                    this.mantenerPantallaDespierta();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.mantenerPantallaDespierta();
                    });

                    this.playAudioAviso('connect');

                    this.actualizarMiEstadoBD();

                    // RADAR 
                    db.collection("bustalk_buses").onSnapshot(snap => {
                        const lista =[];
                        let hayActualizacionExterna = false;

                        snap.forEach(doc => {
                            const data = doc.data();
                            if(doc.id !== this.miBus && (this.miLinea === 'General' || data.linea === this.miLinea || data.linea === 'General')) {
                                if(data.timestamp > Date.now() - (2 * 60 * 60 * 1000)) {
                                    lista.push({ id: doc.id, ...data });
                                    if (!this.isInitialLoad && (Date.now() - data.timestamp < 5000)) {
                                        hayActualizacionExterna = true;
                                    }
                                }
                            }
                        });
                        this.compañeros = lista.sort((a,b) => b.pax - a.pax);
                        
                        if (hayActualizacionExterna && this.estadoRadio === 'reposo') {
                            this.playAudioAviso('remote-update');
                        }
                        this.isInitialLoad = false;
                    });

                    // RADIO 
                    db.collection("bustalk_radio").orderBy("timestamp", "desc").limit(1)
                        .onSnapshot(snap => {
                            if(snap.empty) return;
                            const msg = snap.docs[0].data();
                            const msgId = snap.docs[0].id;
                            
                            if (msg.bus !== this.miBus && this.streamingMsgId !== msgId && (this.miLinea === 'General' || msg.linea === this.miLinea || msg.linea === 'General')) {
                                this.streamingMsgId = msgId;
                                this.ultimoAudio = msg.audioBase64; 
                                this.reproducirMensaje(msg.audioBase64, msg.bus, msg.linea);
                            }
                        });
                        
                    navigator.mediaDevices.getUserMedia({ audio: true }).catch(e => console.log("Mic no autorizado aún"));
                },

                cerrarTurno() {
                    if(confirm("¿Apagar la radio y salir de tu turno?")) {
                        db.collection("bustalk_buses").doc(this.miBus).delete();
                        localStorage.removeItem('bustalk_bus');
                        localStorage.removeItem('bustalk_linea');
                        this.screen = 1; 
                    }
                },

                iniciarPax(valor, event) {
                    if(event) event.preventDefault();
                    this.cambiarPasajerosUnico(valor);
                    this.timerAutoStopPax = setTimeout(() => {
                        this.intervaloPax = setInterval(() => { this.cambiarPasajerosUnico(valor); }, 150); 
                    }, 400);
                },
                cambiarPasajerosUnico(valor) {
                    this.miPax = Math.max(0, this.miPax + valor);
                    this.playAudioAviso('tick'); 
                },
                pararPax(event) {
                    if(event) event.preventDefault();
                    if(this.timerAutoStopPax) clearTimeout(this.timerAutoStopPax);
                    if(this.intervaloPax) {
                        clearInterval(this.intervaloPax);
                        this.intervaloPax = null;
                    }
                    this.actualizarMiEstadoBD(); 
                },

                actualizarUbicacion(lugar) {
                    this.miUbicacion = lugar; this.enParada = true; this.etaFinal = null;
                    this.actualizarMiEstadoBD();
                    this.playAudioAviso('ui-tap');
                },

                toggleParada() {
                    this.enParada = !this.enParada;
                    if(!this.enParada) { this.etaFinal = Date.now() + (this.minutosRuta * 60 * 1000); } 
                    else { this.etaFinal = null; }
                    this.actualizarMiEstadoBD();
                    this.playAudioAviso('ui-tap');
                },

                ajustarMinutos(val) {
                    this.minutosRuta = Math.max(1, this.minutosRuta + val);
                    this.etaFinal = Date.now() + (this.minutosRuta * 60 * 1000);
                    this.actualizarMiEstadoBD();
                    this.playAudioAviso('tick');
                },

                toggleAlerta(tipo) {
                    if (this.miAlerta === tipo) this.miAlerta = null; 
                    else this.miAlerta = tipo; 
                    this.actualizarMiEstadoBD();
                    this.playAudioAviso('ui-tap');
                },

                actualizarMiEstadoBD() {
                    if(!this.conectado) return;
                    db.collection("bustalk_buses").doc(this.miBus).set({
                        linea: this.miLinea, pax: this.miPax, ubicacion: this.miUbicacion,
                        enParada: this.enParada, eta: this.etaFinal, alerta: this.miAlerta, timestamp: Date.now()
                    });
                },

                calcularMinutos(etaMs) {
                    if(!etaMs) return 0;
                    const diff = etaMs - Date.now();
                    return Math.max(0, Math.round(diff / 60000));
                },

                // RADIO 1 TOQUE
                toggleRadio() {
                    if (this.estadoRadio === 'reposo') {
                        this.empezarGrabar();
                    } else if (this.estadoRadio === 'grabando') {
                        this.pararGrabar();
                    }
                },

                empezarGrabar() {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        this.estadoRadio = 'grabando';
                        if ("vibrate" in navigator) navigator.vibrate([50, 50]); 

                        this.chunks =[];
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.mediaRecorder.ondataavailable = e => { this.chunks.push(e.data); };

                        this.mediaRecorder.onstop = async () => {
                            const audioBlob = new Blob(this.chunks, { type: 'audio/webm' });
                            const base64Audio = await this.blobToBase64(audioBlob);

                            const canalEnvio = this.modoGlobal ? 'General' : this.miLinea;

                            db.collection("bustalk_radio").add({
                                bus: this.miBus, linea: canalEnvio,
                                audioBase64: base64Audio, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            
                            stream.getTracks().forEach(track => track.stop());
                            if(this.modoGlobal) this.modoGlobal = false;
                        };
                        
                        this.mediaRecorder.start();

                        clearTimeout(this.timerAutoStop);
                        this.timerAutoStop = setTimeout(() => {
                            if(this.estadoRadio === 'grabando') this.pararGrabar();
                        }, 15000);

                    }).catch(err => { alert("Activa los permisos de micrófono para hablar."); });
                },

                pararGrabar() {
                    if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                        this.mediaRecorder.stop();
                    }
                    this.estadoRadio = 'reposo';
                    clearTimeout(this.timerAutoStop);
                    if ("vibrate" in navigator) navigator.vibrate(30); 
                },

                reproducirMensaje(base64, busSender, lineaMensaje) {
                    this.estadoRadio = 'recibiendo'; 
                    this.elQueHabla = busSender;
                    this.lineaQueHabla = lineaMensaje === 'General' ? 'AVISO GLOBAL' : lineaMensaje;
                    
                    if ("vibrate" in navigator) navigator.vibrate([100, 100, 100]); 
                    
                    clearTimeout(this.watchdogRadio);
                    this.watchdogRadio = setTimeout(() => { this.resetRadio(); }, 15000);

                    const esGlobal = (lineaMensaje === 'General');
                    this.playAudioAviso(esGlobal ? 'global' : 'local');
                    
                    const esperaVoz = esGlobal ? 1400 : 500;

                    setTimeout(() => {
                        try {
                            const audio = new Audio(base64);
                            
                            const ctx = new (window.AudioContext || window.webkitAudioContext)();
                            const source = ctx.createMediaElementSource(audio);
                            const gainNode = ctx.createGain();
                            gainNode.gain.value = 3.0; // Sube volumen al 300%
                            source.connect(gainNode);
                            gainNode.connect(ctx.destination);

                            audio.play().catch(e => { console.log("Bloqueado"); this.resetRadio(); });
                            audio.onended = () => { this.resetRadio(); };
                            audio.onerror = () => { this.resetRadio(); };
                        } catch(err) {
                            const audio = new Audio(base64);
                            audio.play();
                            audio.onended = () => { this.resetRadio(); };
                        }
                    }, esperaVoz); 
                },

                repetirUltimoAudio() {
                    if (!this.ultimoAudio || this.estadoRadio !== 'reposo') return;
                    this.reproducirMensaje(this.ultimoAudio, "REPETICIÓN", this.lineaQueHabla);
                },

                resetRadio() {
                    this.estadoRadio = 'reposo'; this.elQueHabla = null; this.lineaQueHabla = '';
                    clearTimeout(this.watchdogRadio);
                },

                blobToBase64(blob) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader(); reader.readAsDataURL(blob);
                        reader.onloadend = () => resolve(reader.result); reader.onerror = reject;
                    });
                },

                playAudioAviso(tipo) {
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        
                        if (tipo === 'tick') {
                            osc.type = 'sine'; osc.frequency.setValueAtTime(1000, ctx.currentTime);
                            gain.gain.setValueAtTime(0.1, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                            osc.start(); osc.stop(ctx.currentTime + 0.05);
                            
                        } else if (tipo === 'ui-tap') {
                            osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                            gain.gain.setValueAtTime(0.3, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                            osc.start(); osc.stop(ctx.currentTime + 0.1);
                            
                        } else if (tipo === 'remote-update') {
                            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.2);
                            gain.gain.setValueAtTime(0.3, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                            osc.start(); osc.stop(ctx.currentTime + 0.2);

                        } else if (tipo === 'local') {
                            osc.type = 'triangle'; 
                            osc.frequency.setValueAtTime(900, ctx.currentTime);
                            gain.gain.setValueAtTime(1.0, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                            osc.start(); osc.stop(ctx.currentTime + 0.3);
                            
                        } else if (tipo === 'global') {
                            osc.type = 'triangle'; 
                            osc.frequency.setValueAtTime(880, ctx.currentTime); 
                            osc.frequency.setValueAtTime(880, ctx.currentTime + 0.4);
                            osc.frequency.setValueAtTime(659, ctx.currentTime + 0.45); 
                            
                            gain.gain.setValueAtTime(0, ctx.currentTime);
                            gain.gain.linearRampToValueAtTime(1.5, ctx.currentTime + 0.1); 
                            gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.4); 
                            
                            gain.gain.linearRampToValueAtTime(1.5, ctx.currentTime + 0.45); 
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2); 

                            osc.start(); osc.stop(ctx.currentTime + 1.2);
                            
                        } else if (tipo === 'connect') {
                            osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime);
                            gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                            osc.start(); osc.stop(ctx.currentTime + 0.5);
                        }
                    } catch (e) { }
                }
            }
        }
    </script>
</body>
</html>
